on:
  push:
    branches: [main, master, devel]
  pull_request:
    branches: [main, master, devel]

name: R-CMD-check

jobs:
  R-CMD-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: "release"
          use-public-rspm: true

      - name: Install BiocManager
        run: |
          install.packages("BiocManager")
          BiocManager::install(version = "3.21", ask = FALSE)
        shell: Rscript {0}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libhdf5-dev libcurl4-openssl-dev libssl-dev

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            any::rcmdcheck
            any::remotes
          needs: check

      - name: Install GitHub-only dependencies
        run: |
          remotes::install_github("billila/imageTCGA", upgrade = "never")
          remotes::install_github("waldronlab/imageFeatureTCGA", upgrade = "never")
          remotes::install_github("waldronlab/imageTCGAutils", upgrade = "never")
          remotes::install_github("waldronlab/HistoImagePlot", upgrade = "never")
        shell: Rscript {0}

      - uses: r-lib/actions/check-r-package@v2
        with:
          args: 'c("--no-manual", "--as-cran")'
          error-on: '"error"'
