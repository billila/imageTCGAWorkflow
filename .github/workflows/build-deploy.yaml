## BuildABiocWorkshop-style workflow for imageTCGAWorkflow
## Ref: https://github.com/Bioconductor/BuildABiocWorkshop

name: Build and deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:

  ## ──────────────────────────────────────────────
  ## 1. Build pkgdown site → GitHub Pages
  ## ──────────────────────────────────────────────
  pkgdown:
    runs-on: ubuntu-latest
    container: bioconductor/bioconductor_docker:RELEASE_3_23
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          apt-get update && apt-get install -y --no-install-recommends \
            python3-pip libicu-dev libhdf5-dev \
            libgdal-dev libudunits2-dev libproj-dev libgeos-dev rsync

      - name: Install package + pkgdown
        run: |
          Rscript -e "devtools::install('.', dependencies = TRUE)"
          Rscript -e "install.packages('pkgdown')"

      - name: Build pkgdown site
        run: |
          Rscript -e "pkgdown::build_site_github_pages( \
            new_process = FALSE, install = FALSE)"

      - name: Deploy to GitHub Pages
        if: github.event_name == 'push'
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: docs
          clean: false

  ## ──────────────────────────────────────────────
  ## 2. Docker build + push to GHCR
  ## ──────────────────────────────────────────────
  docker:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
