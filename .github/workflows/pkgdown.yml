on:
  push:
    branches: [main, master]
  release:
    types: [published]
  workflow_dispatch:

name: pkgdown

permissions:
  contents: write
  pages: write

jobs:
  pkgdown:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: "release"
          use-public-rspm: true

      - name: Install BiocManager
        run: |
          install.packages("BiocManager")
          BiocManager::install(version = "3.21", ask = FALSE)
        shell: Rscript {0}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libhdf5-dev libcurl4-openssl-dev libssl-dev

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            any::pkgdown
            any::remotes
          needs: website

      - name: Install GitHub-only dependencies
        run: |
          remotes::install_github("billila/imageTCGA", upgrade = "never")
          remotes::install_github("waldronlab/imageFeatureTCGA", upgrade = "never")
          remotes::install_github("waldronlab/imageTCGAutils", upgrade = "never")
          remotes::install_github("waldronlab/HistoImagePlot", upgrade = "never")
        shell: Rscript {0}

      - name: Build site
        run: pkgdown::build_site_github_pages(new_process = FALSE, install = FALSE)
        shell: Rscript {0}

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          clean: false
          branch: gh-pages
          folder: docs
