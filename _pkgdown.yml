url: https://billila.github.io/imageTCGAWorkflow

template:
  bootstrap: 5
  bootswatch: flatly
  bslib:
    primary: "#0054AD"      # Bioconductor blue
    pkgdown-nav-height: 64px

home:
  title: "imageTCGAWorkflow"
  description: >
    End-to-end Bioconductor workflow for histopathology image analysis
    using TCGA diagnostic whole-slide images.
  links:
    - text: Bioconductor page
      href: https://bioconductor.org/packages/imageTCGAWorkflow
    - text: Report a bug
      href: https://github.com/billila/imageTCGAWorkflow/issues

navbar:
  structure:
    left:  [intro, articles, reference]
    right: [search, github]
  components:
    github:
      icon: fab fa-github fa-lg
      href: https://github.com/billila/imageTCGAWorkflow
      aria-label: GitHub

articles:
  - title: Workflow
    navbar: Workflow
    contents:
      - imageTCGAWorkflow

reference:
  - title: Package
    contents:
      - imageTCGAWorkflow-package

footer:
  structure:
    left: developed_by
    right: built_with
