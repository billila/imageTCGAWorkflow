url: https://billila.github.io/imageTCGAWorkflow

template:
  bootstrap: 5
  bootswatch: flatly
  bslib:
    primary: "#621681"
    pkgdown-nav-height: 64px
  includes:
    in_header: |
      <style>.pkg-logo { display: none !important; }</style>

home:
  title: "imageTCGAWorkflow"
  description: >
    End-to-end Bioconductor workflow for histopathology image analysis
    using TCGA diagnostic whole-slide images.
  links:
    - text: hovernethelp (GPU setup)
      href: https://github.com/hpages/hovernethelp
    - text: Report a bug
      href: https://github.com/billila/imageTCGAWorkflow/issues

reference: ~

navbar:
  logo: ~
  structure:
    left:  [intro, articles]
    right: [search, github]
  components:
    github:
      icon: fab fa-github fa-lg
      href: https://github.com/billila/imageTCGAWorkflow
      aria-label: GitHub

articles:
  - title: Workflow
    navbar: Workflow
    contents:
      - imageTCGAWorkflow
      - workshopEuroBioc2026

  - title: Data Access
    navbar: Data Access
    contents:
      - download-tcga-images

  - title: Feature Extraction
    navbar: Feature Extraction
    contents:
      - hovernet-reproducibility
      - provgigapath-extraction

  - title: Packages
    navbar: Packages
    contents:
      - pkg-imageTCGA
      - pkg-imageFeatureTCGA
      - pkg-imageTCGAutils
      - pkg-HistoImagePlot

  - title: Downstream Analyses
    navbar: Downstream Analyses
    contents:
      - downstream-analyses

footer:
  structure:
    left: developed_by
    right: built_with
